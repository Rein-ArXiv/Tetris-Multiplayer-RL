# UI image manifest.
# Paths are relative to the current working directory. The build copies assets/
# next to the executable, so these paths work from the build directory too.
#
# If a configured image fails to load, the game falls back to the default path
# below and then to a generated built-in icon.

player_icon = assets/icons/player.png
opponent_icon = assets/icons/opponent.png
bot_icon = assets/icons/bot.png

# Player avatar catalog.
# The ids must match the authoritative ids returned by tetris_meta.
icon.ruby = assets/icons/opponent.png
icon.gold = assets/icons/bot.png
